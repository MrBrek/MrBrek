name: SimplePlugin
version: 1.0.0
main: com.mrbrek.simpleplugin.SimplePlugin
api-version: '1.20'
author: MrBrek
commands:
  hello:
    description: Выводит приветственное сообщение.
    usage: /hello
  heal:
    description: Полностью лечит игрока.
    usage: /heal
    permission: simpleplugin.heal
permissions:
  simpleplugin.heal:
    description: Позволяет использовать /heal
    default: true
